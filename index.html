<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Lewis's Gameshow</title>
<style>
body{
margin:0;font-family:Segoe UI,Arial,sans-serif;color:#fff;
background:linear-gradient(135deg,#08101f,#1a1d4d,#4d1270);
min-height:100vh;
}
.container{max-width:1100px;margin:auto;padding:20px}
.card{
background:rgba(255,255,255,.08);
backdrop-filter:blur(12px);
border-radius:20px;padding:20px;margin-top:15px;
box-shadow:0 0 20px rgba(0,0,0,.3);
animation:fade .5s;
}
@keyframes fade{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
h1{text-align:center}
button{
padding:12px 20px;border:none;border-radius:12px;cursor:pointer;
background:linear-gradient(45deg,#4b6fff,#8a44ff);color:white;font-size:16px
}
input,select{padding:10px;border-radius:10px;border:none;margin:5px}
#turn{
font-size:2rem;text-align:center;font-weight:bold;
text-shadow:0 0 15px #8ab4ff;
}
.option{
display:block;width:min(700px,100%);margin:10px auto;
}
.option:hover{transform:scale(1.03)}
#players{display:flex;flex-wrap:wrap;gap:10px;justify-content:center}
.player{
min-width:170px;background:rgba(255,255,255,.08);
padding:12px;border-radius:15px;transition:.3s
}
.active{outline:3px solid gold;box-shadow:0 0 20px gold}
.bar{height:12px;background:#111;border-radius:999px;overflow:hidden}
.fill{height:100%;background:linear-gradient(90deg,#00ff95,#00d4ff)}
.win{font-size:2rem;text-align:center}

/* Answer feedback */
.option.correct{background:linear-gradient(45deg,#00c96e,#00ff95)!important;color:#001a0d!important;box-shadow:0 0 22px #00ff95;transform:scale(1.05)!important}
.option.wrong{background:linear-gradient(45deg,#c90000,#ff4444)!important;color:#fff!important;box-shadow:0 0 22px #ff4444;opacity:.8}
.option:disabled{pointer-events:none}
#resultFlash{display:none;position:fixed;inset:0;z-index:10000;align-items:center;justify-content:center;flex-direction:column;gap:16px;pointer-events:none;background:rgba(0,0,0,.55);backdrop-filter:blur(4px)}
#resultFlash.show{display:flex}
#resultIcon{font-size:7rem;line-height:1}
#resultMsg{font-size:2.4rem;font-weight:900;text-align:center;padding:0 20px;text-shadow:0 0 20px currentColor}
@keyframes popIn{0%{transform:scale(.3);opacity:0}60%{transform:scale(1.18);opacity:1}100%{transform:scale(1)}}
@keyframes fadeOut{0%{opacity:1}100%{opacity:0}}
#resultFlash.show #resultIcon,#resultFlash.show #resultMsg{animation:popIn .38s cubic-bezier(.34,1.56,.64,1) forwards}
#resultFlash.hiding{animation:fadeOut .35s forwards}

/* ── Circular Timer ── */
#timerWrap{
  display:flex;align-items:center;justify-content:center;gap:20px;
  margin:14px 0 6px;
}
#timerSvgWrap{
  position:relative;width:90px;height:90px;flex-shrink:0;
}
#timerSvgWrap svg{
  transform:rotate(-90deg);
  filter:drop-shadow(0 0 8px var(--ring-color,#00ff95));
  transition:filter .4s;
}
#timerRingBg{
  fill:none;stroke:rgba(255,255,255,.1);stroke-width:8;
}
#timerRing{
  fill:none;stroke:var(--ring-color,#00ff95);stroke-width:8;
  stroke-linecap:round;
  stroke-dasharray:226;   /* 2π×36 ≈ 226 */
  stroke-dashoffset:0;
  transition:stroke-dashoffset 1s linear, stroke .4s;
}
#timerNum{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  font-size:1.7rem;font-weight:900;
  color:var(--ring-color,#00ff95);
  text-shadow:0 0 10px var(--ring-color,#00ff95);
  transition:color .4s, text-shadow .4s;
  font-variant-numeric:tabular-nums;
}

/* pulse when ≤5 s */
@keyframes urgentPulse{
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.15)}
}
#timerSvgWrap.urgent{animation:urgentPulse .6s ease-in-out infinite}

/* ring shake on time-up */
@keyframes shake{
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-6px)}
  40%{transform:translateX(6px)}
  60%{transform:translateX(-4px)}
  80%{transform:translateX(4px)}
}
#timerSvgWrap.shake{animation:shake .45s ease}

/* thin bar below the circle (decorative echo) */
#timerBarStrip{
  flex:1;height:8px;background:#111;border-radius:999px;overflow:hidden;
}
#timerBarFill{
  height:100%;width:100%;
  background:linear-gradient(90deg,var(--ring-color,#00ff95),#00d4ff);
  transition:width 1s linear, background .4s;
}
</style>
</head>
<body>
<div class="container">
<h1>🎤 Lewis's Gameshow 🎤</h1>

<div id="setup" class="card">
<label>Players:</label>
<select id="count"><option>2</option><option>3</option><option>4</option><option>5</option><option>6</option></select>
<label>Difficulty:</label>
<select id="difficulty">
<option value="easy">Easy</option>
<option value="medium">Medium</option>
<option value="hard">Hard</option>
</select>
<button onclick="makeInputs()">Create Players</button>
<div id="inputs"></div>
<button onclick="start()">Start Game</button>
</div>

<div id="game" style="display:none">
<div id="turn"></div>
<div class="card">

  <!-- ── Animated timer ── -->
  <div id="timerWrap">
    <div id="timerSvgWrap">
      <svg viewBox="0 0 80 80" width="90" height="90" xmlns="http://www.w3.org/2000/svg">
        <circle id="timerRingBg" cx="40" cy="40" r="36"/>
        <circle id="timerRing"   cx="40" cy="40" r="36"/>
      </svg>
      <div id="timerNum">20</div>
    </div>
    <div id="timerBarStrip"><div id="timerBarFill"></div></div>
  </div>

  <h2 id="question"></h2>
  <div id="answers"></div>
</div>
<div id="players"></div>
<div id="transitionScreen" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:9999;align-items:center;justify-content:center;flex-direction:column;font-size:2rem;text-align:center">
<div>The person answering next is...</div>
<div id="nextPlayerName" style="font-size:3rem;margin-top:20px;color:gold"></div>
</div>
</div>

<script>
const TOTAL=20;
const CIRCUMFERENCE=226; // 2π×36

const questions={
easy:[
["What colour is the sky on a clear day?",["Blue","Red","Green","Pink"],0],
["2 + 2 = ?",["4","5","6","7"],0],
["How many days are in a week?",["6","7","8","9"],1],
["Which animal says meow?",["Dog","Cat","Cow","Horse"],1],
["What planet do we live on?",["Earth","Mars","Venus","Jupiter"],0],
["How many legs does a spider have?",["4","6","8","10"],2],
["What colour is a banana?",["Red","Blue","Yellow","Green"],2],
["Which season comes after summer?",["Spring","Winter","Autumn","Summer"],2],
["How many sides does a triangle have?",["2","3","4","5"],1],
["What do bees make?",["Milk","Honey","Butter","Jam"],1],
["Which ocean is the largest?",["Atlantic","Indian","Pacific","Arctic"],2],
["What is the colour of grass?",["Blue","Green","Brown","Yellow"],1],
["How many months are in a year?",["10","11","12","13"],2],
["What sound does a duck make?",["Moo","Quack","Oink","Baa"],1],
["Which fruit is red and grows on trees?",["Banana","Apple","Mango","Pear"],1],
["How many fingers does a human hand have?",["4","5","6","7"],1],
["What is frozen water called?",["Steam","Rain","Ice","Snow"],2],
["Which vehicle flies in the sky?",["Car","Boat","Aeroplane","Train"],2],
["How many wheels does a bicycle have?",["1","2","3","4"],1],
["What do you use to write on a whiteboard?",["Pencil","Pen","Marker","Crayon"],2],
["What is the opposite of hot?",["Warm","Wet","Cold","Dry"],2],
["Which planet is closest to the Sun?",["Venus","Mars","Earth","Mercury"],3],
["How many zeros are in one hundred?",["1","2","3","4"],1],
["Which animal is the king of the jungle?",["Tiger","Lion","Elephant","Cheetah"],1],
["What shape is a football?",["Cube","Cylinder","Sphere","Cone"],2],
["What do you call a baby dog?",["Kitten","Cub","Puppy","Foal"],2],
["How many primary colours are there?",["2","3","4","5"],1],
["Which is the tallest animal?",["Elephant","Giraffe","Horse","Camel"],1],
["What is the capital of England?",["Manchester","Birmingham","London","Leeds"],2],
["How many hours are in a day?",["12","20","24","48"],2]
],
medium:[
["Capital of France?",["Berlin","Paris","Rome","Madrid"],1],
["15 × 4 = ?",["50","55","60","65"],2],
["How many continents are there?",["5","6","7","8"],2],
["What do plants absorb from the air?",["Oxygen","Carbon Dioxide","Helium","Hydrogen"],1],
["Who painted the Mona Lisa?",["Da Vinci","Monet","Picasso","Van Gogh"],0],
["What is the chemical symbol for water?",["WO","H2O","HO2","W2O"],1],
["Which country has the most population?",["USA","India","China","Russia"],2],
["In what year did World War II end?",["1943","1944","1945","1946"],2],
["What is the powerhouse of the cell?",["Nucleus","Ribosome","Mitochondria","Vacuole"],2],
["How many players are on a football team?",["9","10","11","12"],2],
["What gas do humans breathe out?",["Oxygen","Nitrogen","Carbon Dioxide","Helium"],2],
["Which planet is known as the Red Planet?",["Jupiter","Saturn","Mars","Neptune"],2],
["What is 12 squared?",["132","144","124","154"],1],
["Who wrote Romeo and Juliet?",["Dickens","Shakespeare","Austen","Tolkien"],1],
["What is the longest river in the world?",["Amazon","Nile","Yangtze","Mississippi"],1],
["What is the speed of light (approx)?",["300 km/s","3,000 km/s","300,000 km/s","30,000 km/s"],2],
["How many strings does a standard guitar have?",["4","5","6","7"],2],
["Which element has the symbol O?",["Gold","Osmium","Oxygen","Oxide"],2],
["What is the capital of Japan?",["Seoul","Beijing","Bangkok","Tokyo"],3],
["Who invented the telephone?",["Edison","Tesla","Bell","Marconi"],2],
["What is the hardest natural substance?",["Gold","Iron","Diamond","Quartz"],2],
["How many degrees in a right angle?",["45","60","90","180"],2],
["What year did the Titanic sink?",["1910","1912","1914","1916"],1],
["Which country gifted the Statue of Liberty to the USA?",["Italy","Spain","France","Germany"],2],
["What is the capital of Australia?",["Sydney","Melbourne","Canberra","Brisbane"],2],
["What is 20% of 200?",["20","30","40","50"],2],
["How many bones are in the human ear?",["1","2","3","4"],2],
["What is the largest planet in our solar system?",["Saturn","Neptune","Jupiter","Uranus"],2],
["Which language has the most native speakers?",["English","Spanish","Mandarin","Hindi"],2],
["What is the boiling point of water in Celsius?",["90°","95°","100°","105°"],2]
],
hard:[
["Square root of 144?",["10","11","12","13"],2],
["What element does the symbol Au represent?",["Gold","Silver","Iron","Copper"],0],
["Who developed the theory of relativity?",["Newton","Einstein","Tesla","Galileo"],1],
["What is the largest ocean?",["Atlantic","Pacific","Indian","Arctic"],1],
["How many bones are in an adult human body?",["206","208","210","212"],0],
["What is the value of Pi to 4 decimal places?",["3.1416","3.1514","3.1618","3.1214"],0],
["Which scientist discovered penicillin?",["Pasteur","Curie","Fleming","Jenner"],2],
["What is the atomic number of carbon?",["4","6","8","12"],1],
["In which year did the Berlin Wall fall?",["1987","1988","1989","1990"],2],
["What is the smallest country in the world?",["Monaco","Nauru","Vatican City","San Marino"],2],
["Which amendment to the US Constitution abolished slavery?",["12th","13th","14th","15th"],1],
["What is the chemical symbol for potassium?",["Po","Pt","K","Ka"],2],
["Which philosopher wrote 'The Republic'?",["Aristotle","Socrates","Plato","Descartes"],2],
["What is the speed of sound at sea level (m/s)?",["240","343","440","520"],1],
["In what year was the first iPhone released?",["2005","2006","2007","2008"],2],
["What is Avogadro's number (approx)?",["6.02×10²²","6.02×10²³","6.02×10²⁴","6.02×10²¹"],1],
["Who wrote '1984'?",["Huxley","Kafka","Orwell","Bradbury"],2],
["What is the currency of Switzerland?",["Euro","Franc","Krone","Mark"],1],
["Which bone is the longest in the human body?",["Tibia","Humerus","Femur","Fibula"],2],
["How many moons does Mars have?",["0","1","2","3"],2],
["What is the half-life of Carbon-14 (approx years)?",["2,730","5,730","11,460","57,300"],1],
["Which country has the most time zones?",["Russia","USA","China","France"],3],
["What is the only even prime number?",["0","1","2","4"],2],
["In what century did the Renaissance begin?",["13th","14th","15th","16th"],1],
["Who composed 'The Four Seasons'?",["Bach","Mozart","Vivaldi","Handel"],2],
["What is the pH of pure water?",["5","6","7","8"],2],
["Which element is liquid at room temperature (besides mercury)?",["Bromine","Chlorine","Fluorine","Iodine"],0],
["What is the Pythagorean theorem?",["a²+b=c²","a+b²=c²","a²+b²=c²","a²-b²=c"],2],
["Which war was ended by the Treaty of Versailles?",["WWI","WWII","Korean War","Crimean War"],0],
["What is the largest organ in the human body?",["Liver","Brain","Lungs","Skin"],3]
]
};

let players=[],current=0,diff="easy",final=false,finalPlayer=null,finalCount=0,currentQ=null;
let timer,t=TOTAL;

/* ── Timer colour helpers ── */
function timerColor(s){
  if(s>10) return "#00ff95";
  if(s>5)  return "#ffd000";
  return "#ff4444";
}
function setTimerColor(c){
  document.documentElement.style.setProperty("--ring-color",c);
}
function updateTimerUI(s){
  const frac=s/TOTAL;
  const offset=CIRCUMFERENCE*(1-frac);
  document.getElementById("timerRing").style.strokeDashoffset=offset;
  document.getElementById("timerBarFill").style.width=(frac*100)+"%";
  document.getElementById("timerNum").textContent=s;
  const c=timerColor(s);
  setTimerColor(c);
  const wrap=document.getElementById("timerSvgWrap");
  if(s<=5) wrap.classList.add("urgent");
  else     wrap.classList.remove("urgent");
}

function shakeTimer(){
  const wrap=document.getElementById("timerSvgWrap");
  wrap.classList.remove("shake","urgent");
  void wrap.offsetWidth; // reflow
  wrap.classList.add("shake");
  setTimeout(()=>wrap.classList.remove("shake"),500);
}

function makeInputs(){
let n=+count.value;
inputs.innerHTML="";
for(let i=0;i<n;i++){
inputs.innerHTML+=`<div><input id="p${i}" placeholder="Player ${i+1}"></div>`;
}
}
makeInputs();

function start(){
players=[];
diff=difficulty.value;
for(let i=0;i<+count.value;i++){
players.push({name:document.getElementById("p"+i).value||("Player "+(i+1)),streak:0});
}
setup.style.display="none";
game.style.display="block";
updateBoard();
showNextPlayerScreen();
}

function randQ(){
let q=questions[diff];
return q[Math.floor(Math.random()*q.length)];
}

function startTimer(){
clearInterval(timer);
t=TOTAL;
updateTimerUI(t);
timer=setInterval(()=>{
t--;
updateTimerUI(t);
if(t<=0){
clearInterval(timer);
shakeTimer();
setTimeout(wrongAnswer,450);
}
},1000);
}

function nextQuestion(){
currentQ=randQ();
question.textContent=currentQ[0];
answers.innerHTML="";
(currentQ[1]).forEach((a,i)=>{
let b=document.createElement("button");
b.className="option";
b.textContent=a;
b.onclick=()=>answer(i);
answers.appendChild(b);
});
if(final){
turn.innerHTML=`🏆 FINAL ROUND: ${finalPlayer.name} (${finalCount+1}/4)`;
}else{
turn.innerHTML=`🎤 NOW ANSWERING: ${players[current].name}`;
}
startTimer();
}

function showResult(correct, correctIndex){
  clearInterval(timer);
  document.querySelectorAll('#answers .option').forEach((b,i)=>{
    b.disabled=true;
    if(i===correctIndex) b.classList.add('correct');
    else if(!correct && b._chosen) b.classList.add('wrong');
  });
  const flash=document.getElementById('resultFlash');
  const icon=document.getElementById('resultIcon');
  const msg=document.getElementById('resultMsg');
  if(correct){
    flash.style.color='#00ff95';
    icon.textContent='';
    msg.textContent='Correct!';
  } else {
    flash.style.color='#ff4444';
    icon.textContent='';
    msg.textContent='Wrong!';
  }
  flash.classList.remove('hiding');
  flash.classList.add('show');
  setTimeout(()=>{
    flash.classList.add('hiding');
    setTimeout(()=>{flash.classList.remove('show','hiding')},360);
  },900);
}

function answer(i){
clearInterval(timer);
// mark the chosen button
const btns=document.querySelectorAll('#answers .option');
btns.forEach(b=>b._chosen=false);
if(btns[i]) btns[i]._chosen=true;
const isCorrect=(i===currentQ[2]);
showResult(isCorrect, currentQ[2]);
if(isCorrect){
if(final){
finalCount++;
if(finalCount>=4){
document.body.innerHTML='<div class="container"><div class="card win">🏆 '+finalPlayer.name+' WINS THE GAME SHOW!</div></div>';
return;
}
setTimeout(nextQuestion,1300);
return;
}
players[current].streak++;
if(players[current].streak>=5){
final=true;
finalPlayer=players[current];
finalCount=0;
alert(finalPlayer.name+" reached 5 in a row and enters the FINAL ROUND!");
setTimeout(nextQuestion,1300);
return;
}
}else{
setTimeout(()=>{ wrongAnswer(); },1300);
return;
}
setTimeout(()=>{ nextTurn(); },1300);
}

function wrongAnswer(){
if(final){
alert("Final round failed!");
final=false;
finalPlayer=null;
finalCount=0;
}
players[current].streak=0;
nextTurn();
}

function nextTurn(){
current=(current+1)%players.length;
updateBoard();
showNextPlayerScreen();
}

function showNextPlayerScreen(){
const screen=document.getElementById('transitionScreen');
const name=document.getElementById('nextPlayerName');
name.textContent=players[current].name;
screen.style.display='flex';
setTimeout(()=>{
screen.style.display='none';
nextQuestion();
},2500);
}

function updateBoard(){
playersDiv=document.getElementById("players");
playersDiv.innerHTML="";
players.forEach((p,i)=>{
let d=document.createElement("div");
d.className="player"+(i===current&&!final?" active":"");
d.innerHTML=`<h3>${p.name}</h3>
<div>Streak: ${p.streak}/5</div>
<div class="bar"><div class="fill" style="width:${p.streak*20}%"></div></div>`;
playersDiv.appendChild(d);
});
}
</script>
<div id="resultFlash"><div id="resultIcon"></div><div id="resultMsg"></div></div>
</body>
</html>
